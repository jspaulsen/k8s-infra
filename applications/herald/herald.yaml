apiVersion: apps/v1
kind: Deployment
metadata:
  name: herald
  namespace: herald
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: herald
  template:
    metadata:
      labels:
        app: herald
    spec:
      containers:
        - name: herald
          image: ghcr.io/jspaulsen/herald:sha-8a6b3caeaef17444041c873c1197054f4d36f8e9
          ports:
            - containerPort: 3002
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3002"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(DB_USERNAME):$(DB_PASSWORD)@postgres:5432/postgres?sslmode=disable
            - name: TWITCH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: TWITCH_CLIENT_ID
            - name: TWITCH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: TWITCH_CLIENT_SECRET
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: DISCORD_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: herald
  namespace: herald
spec:
  selector:
    app: herald
  ports:
    - port: 80
      targetPort: 3002
