apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-storage
  namespace: mlflow
  labels:
    app: mlflow-storage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-storage
  template:
    metadata:
      labels:
        app: mlflow-storage
    spec:
      containers:
        - name: rustfs
          image: rustfs/rustfs:1.0.0-alpha.83
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_SERVER_DOMAINS
              value: "mlflow-storage:9000"
            - name: RUSTFS_REGION
              value: us-east-1
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
          volumeMounts:
            - name: storage-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: storage-data
          persistentVolumeClaim:
            claimName: mlflow-storage-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-storage
  namespace: mlflow
  labels:
    app: mlflow-storage
spec:
  selector:
    app: mlflow-storage
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
